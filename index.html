<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHQ Hospital Timergara - Slip Generator</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #e9ecef;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LEFT PANEL (FORM CONTROLS) --- */
        .controls-panel {
            width: 400px;
            background: #ffffff;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }
        .controls-panel h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
            color: #333;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 5px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }
        .form-group input, .form-group select, .form-group textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        #input_slip_type {
            background-color: #e3f2fd;
            font-weight: bold;
            color: #0056b3;
            border-color: #0056b3;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-new { background: #007bff; }
        .btn-new:hover { background: #0056b3; }
        .btn-print { background: #28a745; }
        .btn-print:hover { background: #1e7e34; }

        .history-section {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
            display: flex;
            flex-direction: column;
        }
        .search-bar {
            padding: 8px;
            border: 1px solid #aaa;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 250px;
            overflow-y: auto;
        }
        .history-item {
            padding: 8px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            position: relative;
        }
        .history-item:hover { background: #e2e6ea; }
        .history-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #0056b3;
            color: white;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 3px;
            font-weight: bold;
        }

        /* --- RIGHT PANEL (LIVE PREVIEW) --- */
        .preview-panel {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px;
            overflow-y: auto;
        }
        
        .page-container {
            position: relative;
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 15mm;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        
        .rs-10 {
            position: absolute;
            top: 22px; 
            right: 15mm;
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .slip-border {
            border: 1.5px solid #000;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            margin-top: 18px; 
            padding: 0;
            box-sizing: border-box;
        }

        .header {
            position: relative;
            display: flex; 
            align-items: center; 
            padding: 20px 25px; 
            border-bottom: 1.5px solid #000; 
            min-height: 70px;
            box-sizing: border-box;
        }
        .header img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            margin-right: 40px; 
            flex-shrink: 0; 
        }
        .header-text {
            flex-grow: 1; 
            text-align: center; 
            margin-right: 115px; 
        }
        .header-text h1 {
            margin: 0;
            font-size: 25px; 
            font-weight: bold;
            color: #000;
            white-space: nowrap; 
        }
        .header-text p {
            margin: 5px 0 0 0;
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            border-bottom: 1.5px solid #000; 
        }
        .info-table td {
            border: 1px solid #000;
            padding: 12px 15px; 
            font-size: 14px;
            height: 35px;
            color: #000;
        }
        .info-table tr td:first-child { border-left: none; }
        .info-table tr td:last-child { border-right: none; }
        .info-table tr:first-child td { border-top: none; }
        .info-table tr:last-child td { border-bottom: none; }
        
        .info-table td.label {
            font-weight: bold;
            width: 22%;
            color: #222;
        }
        .info-table td.value {
            font-weight: bold;
            width: 28%;
            text-transform: uppercase;
        }

        .medical-area {
            display: flex;
            flex-grow: 1;
            margin-top: 10px; 
        }
        .left-labels {
            width: 28%;
            border-right: 1.5px solid #000; 
            padding-left: 15px;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
        }
        .left-labels div {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 110px; 
        }
        .left-labels div:first-child { margin-top: 5px; }
        .left-labels div:last-child { margin-bottom: 0; }
        
        .right-content {
            width: 72%;
            padding-left: 20px; 
            padding-right: 20px;
            padding-top: 5px;
            position: relative;
        }
        .right-content h2 {
            margin: 0 0 15px 0;
            font-size: 34px;
            color: #000;
            line-height: 1;
        }
        .rx-text {
            font-size: 15px;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #000;
            font-weight: bold;
        }

        .footer {
            height: 70px;
            position: relative;
            width: 100%;
        }
        .doctor-sign {
            position: absolute;
            bottom: 20px;
            right: 25px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            border-top: 1px solid #000; 
            padding-top: 5px;
            width: 140px;
        }

        /* --- PRINT STYLES --- */
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; height: auto; overflow: visible; display: block; }
            .controls-panel { display: none !important; }
            .preview-panel { padding: 0; overflow: visible; display: block; justify-content: flex-start; }
            .page-container { 
                box-shadow: none; 
                margin: 0; 
                width: 210mm; 
                height: 297mm; 
                page-break-after: avoid;
            }
        }
    </style>
</head>
<body>

    <div class="controls-panel no-print">
        <h2>Enter Patient Details</h2>
        
        <div class="form-group">
            <label>Slip Type</label>
            <select id="input_slip_type" onchange="handleSlipTypeChange()">
                <option value="OPD">OPD</option>
                <option value="Casualty">Casualty</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date & Time</label>
            <input type="datetime-local" id="input_datetime" step="1" oninput="markTimeManual(); updatePreview()">
        </div>

        <div class="form-group">
            <label>Patient Name</label>
            <input type="text" id="input_name" placeholder="E.g. SULTANAT KHAN" oninput="updatePreview()">
        </div>
        <div class="form-group">
            <label>Gender</label>
            <select id="input_gender" onchange="updatePreview()">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" id="input_address" oninput="updatePreview()">
        </div>
        <div class="form-group">
            <label>Shift</label>
            <select id="input_shift" onchange="updatePreview()">
                <option value="Morning">Morning</option>
                <option value="Evening">Evening</option>
                <option value="Night">Night</option>
            </select>
        </div>
        <div class="form-group">
            <label>Age</label>
            <input type="number" id="input_age" value="0" oninput="updatePreview()">
        </div>
        <div class="form-group">
            <label>CNIC</label>
            <input type="text" id="input_cnic" placeholder="XXXXX-XXXXXXX-X" oninput="formatCNIC(this)">
        </div>
        <div class="form-group">
            <label>Specialties</label>
            <input type="text" id="input_specialties" value="Dental" oninput="updatePreview()">
        </div>
        <div class="form-group">
            <label>Doctor Notes (Rx)</label>
            <textarea id="input_rx" rows="5" placeholder="Type prescription or notes here..." oninput="updatePreview()"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-new" onclick="startNewSlip()">New Slip</button>
            <button class="btn-print" onclick="saveAndPrint()">Print / PDF</button>
        </div>

        <div class="history-section">
            <h2>Recent Slips</h2>
            <input type="text" id="search_history" class="search-bar" placeholder="Search by name or MR NO..." oninput="renderHistory()">
            <div class="history-list" id="historyList">
                </div>
        </div>
    </div>

    <div class="preview-panel">
        <div class="page-container" id="printableArea">
            <div class="rs-10">RS 10</div>
            
            <div class="slip-border">
                
                <div class="header">
                    <img src="https://i.ibb.co/4wttnWD3/download-removebg-preview.png" alt="Logo">
                    <div class="header-text">
                        <h1>DHQ Teaching Hospital Timergara</h1>
                        <p><span id="preview_slip_title">OPD Slip</span> <span id="preview_datetime_container" style="display:none;">(<span id="preview_datetime"></span>)</span></p>
                    </div>
                </div>

                <table class="info-table">
                    <tr>
                        <td class="label">Patient Name</td>
                        <td class="value" id="preview_name"></td>
                        <td class="label">Gender</td>
                        <td class="value" id="preview_gender"></td>
                    </tr>
                    <tr>
                        <td class="label">Address</td>
                        <td class="value" id="preview_address"></td>
                        <td class="label">Shift</td>
                        <td class="value" id="preview_shift"></td>
                    </tr>
                    <tr>
                        <td class="label">MR NO #</td>
                        <td class="value" id="preview_mrno"></td>
                        <td class="label">Age</td>
                        <td class="value" id="preview_age"></td>
                    </tr>
                    <tr>
                        <td class="label">CNIC</td>
                        <td class="value" id="preview_cnic"></td>
                        <td class="label">Specialties</td>
                        <td class="value" id="preview_specialties"></td>
                    </tr>
                </table>

                <div class="medical-area">
                    <div class="left-labels">
                        <div>Complaints:</div>
                        <div>Physcical Examination:</div>
                        <div>Investigation:</div>
                        <div>Provisional Diagnosis:</div>
                    </div>
                    <div class="right-content">
                        <h2>Rx</h2>
                        <div class="rx-text" id="preview_rx"></div>
                    </div>
                </div>

                <div class="footer">
                    <div class="doctor-sign">Doctor Sign</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Track if user manually changed the time
        let isManualTime = false;

        function markTimeManual() {
            isManualTime = true;
        }

        function formatCNIC(input) {
            let val = input.value.replace(/\D/g, '');
            let formatted = '';
            if (val.length > 0) { formatted = val.substring(0, 5); }
            if (val.length > 5) { formatted += '-' + val.substring(5, 12); }
            if (val.length > 12) { formatted += '-' + val.substring(12, 13); }
            input.value = formatted;
            updatePreview();
        }

        function handleSlipTypeChange() {
            const slipType = document.getElementById('input_slip_type').value;
            const prefix = slipType === 'Casualty' ? 'CASU' : 'OPD';
            
            if (currentMRNO.startsWith('OPD') || currentMRNO.startsWith('CASU')) {
                currentMRNO = currentMRNO.replace(/^(OPD|CASU)/, prefix);
            } else {
                currentMRNO = generateMRNo();
            }
            updatePreview();
        }

        function generateMRNo() {
            const slipType = document.getElementById('input_slip_type').value;
            const prefix = slipType === 'Casualty' ? 'CASU' : 'OPD';
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const random = Math.floor(100000 + Math.random() * 900000);
            return `${prefix}-${month}-${year}-${random}`;
        }

        // Generates the time in a format the HTML <input type="datetime-local"> can read
        function getCurrentDateTimeLocal() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            return now.toISOString().slice(0, 19); // Keep YYYY-MM-DDTHH:MM:SS
        }

        // Formats the raw calendar value into the nice display style for the slip
        function formatDateTimeForSlip(val) {
            if (!val) return '';
            const d = new Date(val);
            if (isNaN(d.getTime())) return val; 
            const dateStr = d.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
            const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            return `${dateStr} ${timeStr}`;
        }

        let currentMRNO = "";

        function startNewSlip() {
            isManualTime = false;
            document.getElementById('input_slip_type').value = 'OPD';
            document.getElementById('input_name').value = '';
            document.getElementById('input_gender').value = 'Male';
            document.getElementById('input_address').value = '';
            document.getElementById('input_shift').value = 'Morning';
            document.getElementById('input_age').value = '0';
            document.getElementById('input_cnic').value = '';
            document.getElementById('input_specialties').value = 'Dental';
            document.getElementById('input_rx').value = '';
            
            currentMRNO = generateMRNo();
            document.getElementById('input_datetime').value = getCurrentDateTimeLocal();
            
            updatePreview();
        }

        function updatePreview() {
            // Update Title
            const slipType = document.getElementById('input_slip_type').value;
            document.getElementById('preview_slip_title').innerText = slipType === 'Casualty' ? 'Casualty Slip' : 'OPD Slip';

            // Update Time - Handle Empty or Selected Calendar Date
            const rawTimeValue = document.getElementById('input_datetime').value;
            const timeContainer = document.getElementById('preview_datetime_container');
            const timeText = document.getElementById('preview_datetime');
            
            if (rawTimeValue.trim() === '') {
                timeContainer.style.display = 'none'; // Hide parenthesis if empty
            } else {
                timeContainer.style.display = 'inline';
                timeText.innerText = formatDateTimeForSlip(rawTimeValue); // Format it nicely
            }

            // Update Fields
            document.getElementById('preview_name').innerText = document.getElementById('input_name').value;
            document.getElementById('preview_gender').innerText = document.getElementById('input_gender').value;
            document.getElementById('preview_address').innerText = document.getElementById('input_address').value;
            document.getElementById('preview_shift').innerText = document.getElementById('input_shift').value;
            document.getElementById('preview_age').innerText = document.getElementById('input_age').value;
            document.getElementById('preview_cnic').innerText = document.getElementById('input_cnic').value;
            document.getElementById('preview_specialties').innerText = document.getElementById('input_specialties').value;
            document.getElementById('preview_rx').innerText = document.getElementById('input_rx').value;
            
            document.getElementById('preview_mrno').innerText = currentMRNO;
        }

        function saveAndPrint() {
            const slipData = {
                id: currentMRNO,
                date: document.getElementById('input_datetime').value, // Save raw calendar value
                type: document.getElementById('input_slip_type').value, 
                name: document.getElementById('input_name').value,
                gender: document.getElementById('input_gender').value,
                address: document.getElementById('input_address').value,
                shift: document.getElementById('input_shift').value,
                age: document.getElementById('input_age').value,
                cnic: document.getElementById('input_cnic').value,
                specialties: document.getElementById('input_specialties').value,
                rx: document.getElementById('input_rx').value
            };

            if(slipData.name.trim() !== "") {
                let history = JSON.parse(localStorage.getItem('opdHistory')) || [];
                history = history.filter(item => item.id !== slipData.id); 
                history.unshift(slipData); 
                localStorage.setItem('opdHistory', JSON.stringify(history));
                
                document.getElementById('search_history').value = ''; 
                renderHistory();
            }

            window.print();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const searchQuery = document.getElementById('search_history').value.toLowerCase();
            list.innerHTML = '';
            
            let history = JSON.parse(localStorage.getItem('opdHistory')) || [];

            const filteredHistory = history.filter(item => {
                const searchName = item.name ? item.name.toLowerCase() : '';
                const searchId = item.id ? item.id.toLowerCase() : '';
                return searchName.includes(searchQuery) || searchId.includes(searchQuery);
            });

            if (filteredHistory.length === 0) {
                list.innerHTML = `<div style="font-size:12px; color:#777; padding:10px;">No matching slips found.</div>`;
                return;
            }

            filteredHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const slipBadge = item.type === 'Casualty' ? 'CASU' : 'OPD';
                div.innerHTML = `
                    <div class="history-badge" style="background:${item.type === 'Casualty' ? '#dc3545' : '#0056b3'}">${slipBadge}</div>
                    <strong>${item.name || 'Unnamed Patient'}</strong><br>
                    <small>${item.id}</small>
                `;
                div.onclick = () => loadHistoryItem(item);
                list.appendChild(div);
            });
        }

        function loadHistoryItem(item) {
            isManualTime = true; // Lock the time so it doesn't auto-update to current
            document.getElementById('input_slip_type').value = item.type || 'OPD';
            document.getElementById('input_datetime').value = item.date || '';
            document.getElementById('input_name').value = item.name || '';
            document.getElementById('input_gender').value = item.gender || 'Male';
            document.getElementById('input_address').value = item.address || '';
            document.getElementById('input_shift').value = item.shift || 'Morning';
            document.getElementById('input_age').value = item.age || '0';
            document.getElementById('input_cnic').value = item.cnic || '';
            document.getElementById('input_specialties').value = item.specialties || 'Dental';
            document.getElementById('input_rx').value = item.rx || '';
            
            currentMRNO = item.id;
            
            updatePreview();
        }

        window.onload = function() {
            startNewSlip();
            renderHistory();
            
            // Auto update time only if user hasn't touched the calendar and hasn't started typing a name
            setInterval(function() {
                if(!isManualTime && document.getElementById('input_name').value.trim() === '') {
                    document.getElementById('input_datetime').value = getCurrentDateTimeLocal();
                    updatePreview();
                }
            }, 1000);
        };
    </script>
</body>
</html>
